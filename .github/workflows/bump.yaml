name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump_rule:
        type: choice
        description: How to bump the project's version (passed to `uv version --bump`)
        options:
          - stable
          # no patch because we always sit on a pre-release in main,
          # so we would always use stable instead of patch
          - minor
          - major
          - alpha
          - beta
          - rc
        required: true
      update_changelog:
        type: boolean
        default: true
        description: If True, the changelog will be updated with the new version
        required: true

jobs:
  bump_version:
    name: "Bump version and create changelog"
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    runs-on: ubuntu-latest
    env:
      CI_COMMIT_EMAIL: "ci-runner@bookshelf.invalid"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: "${{ secrets.PERSONAL_ACCESS_TOKEN }}"

      - uses: ./.github/actions/setup

      - name: Create bump and changelog
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$CI_COMMIT_EMAIL"

          BUMP_RULE="${{ github.event.inputs.bump_rule }}"

          BASE_VERSION=$(uv version --short)
          echo "Bumping from version $BASE_VERSION"

          # Bump root project, then mirror the resulting version to each
          # workspace package so they stay in lock-step.
          uv version --frozen --bump "$BUMP_RULE"
          NEW_VERSION=$(uv version --short)
          uv version --frozen --package bookshelf "$NEW_VERSION"
          uv version --frozen --package bookshelf-producer "$NEW_VERSION"

          echo "Bumping to version $NEW_VERSION"

          # Build CHANGELOG
          [[ "${{ github.event.inputs.update_changelog }}" == "true" ]] \
            && uv run towncrier build --yes --version v$NEW_VERSION \
            || echo "Skipping changelog update"

          uv lock

          # Commit, tag and push
          git commit -a -m "bump: version $BASE_VERSION -> $NEW_VERSION"
          git tag v$NEW_VERSION
          git push && git push --tags

          # Exit early if the version is a pre-release
          [[ "$NEW_VERSION" =~ ([abrc]+) ]] && exit 0

          # Bump to alpha (so that future commits do not have the same
          # version as the tagged commit)
          BASE_VERSION=$NEW_VERSION

          # Bump to pre-release of next version
          uv version --frozen --bump patch --bump alpha
          NEW_VERSION=$(uv version --short)
          uv version --frozen --package bookshelf "$NEW_VERSION"
          uv version --frozen --package bookshelf-producer "$NEW_VERSION"
          uv lock

          echo "Bumping version $BASE_VERSION > $NEW_VERSION"

          # Commit and push
          # Skip pre-commit to avoid pixi install throwing weird errors
          git commit -n -a -m "bump(pre-release): version $BASE_VERSION > $NEW_VERSION"
          git push
